<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KanaDriller</title>
    <script src="main.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="screen" id="intro">
        <h1>Öva Kana!</h1>
        <div class="option-group">
          <button
            class="option-btn selected"
            id="opt-katakana"
            onclick="selectScript('katakana')"
          >
            カタカナ
          </button>
          <button
            class="option-btn"
            id="opt-hiragana"
            onclick="selectScript('hiragana')"
          >
            ひらがな
          </button>
        </div>
        <div class="option-group">
          <button
            class="option-btn"
            id="opt-enkel"
            onclick="selectKanaSet('basic')"
          >
            Enkel
          </button>
          <button
            class="option-btn selected"
            id="opt-utokad"
            onclick="selectKanaSet('extended')"
          >
            Utökad
          </button>
        </div>
        <div class="option-group">
          <button
            class="option-btn selected"
            id="opt-20"
            onclick="selectCount(20)"
          >
            20
          </button>
          <button class="option-btn" id="opt-30" onclick="selectCount(30)">
            30
          </button>
          <button class="option-btn" id="opt-50" onclick="selectCount(50)">
            50
          </button>
          <button class="option-btn" id="opt-all" onclick="selectCount('ALL')">
            Alla
          </button>
        </div>
        <button class="option-btn" id="start" onClick="startGame()">
          Starta!
        </button>
      </div>

      <div class="screen" id="game">
        <div class="drill">
          <div id="kana"></div>
          <ul class="candidates">
            <li>
              <button id="candidate-1" onClick="respond(event)"></button>
            </li>
            <li>
              <button id="candidate-2" onClick="respond(event)"></button>
            </li>
            <li>
              <button id="candidate-3" onClick="respond(event)"></button>
            </li>
            <li>
              <button id="candidate-4" onClick="respond(event)"></button>
            </li>
          </ul>
          <div class="navigation">
            <button id="previous" onClick="previous()">&lt;</button>
            <button id="next" onClick="next()">&gt;</button>
          </div>
        </div>
      </div>

      <div class="screen" id="results">
        <h1>ケッカ</h1>
        <div id="progress">
          <div id="progress-value"></div>
        </div>
        <p id="result-time"></p>
        <ul id="drills"></ul>
        <button class="option-btn" onclick="goToStart()">Tillbaka</button>
      </div>
    </div>
  </body>
  <script>
    let selectedCount = 20;
    let selectedScript = "katakana";
    let selectedKanaSet = "extended";

    (function () {
      try {
        const prefs = JSON.parse(
          localStorage.getItem("kana-drill-prefs") ?? "null",
        );
        if (!prefs) return;
        if (["katakana", "hiragana"].includes(prefs.script))
          selectScript(prefs.script);
        if (["basic", "extended"].includes(prefs.kanaSet))
          selectKanaSet(prefs.kanaSet);
        if ([20, 30, 50, "ALL"].includes(prefs.count)) selectCount(prefs.count);
      } catch {}
    })();

    let kanaDriller = KanaDriller(selectedCount, selectedScript);
    let startTime;

    function loadStats() {
      try {
        const raw = localStorage.getItem("kana-drill-stats");
        if (!raw) return { version: 1, kana: {} };
        const parsed = JSON.parse(raw);
        if (parsed.version !== 1) return { version: 1, kana: {} };
        return parsed;
      } catch {
        return { version: 1, kana: {} };
      }
    }

    function savePrefs() {
      localStorage.setItem(
        "kana-drill-prefs",
        JSON.stringify({
          script: selectedScript,
          kanaSet: selectedKanaSet,
          count: selectedCount,
        }),
      );
    }

    function saveStats(stats, result, scriptType) {
      const nowMs = Date.now();
      for (const drill of result.drills) {
        const key = `${scriptType}:${drill.correctAnswer}`;
        const entry = stats.kana[key] ?? { seen: 0, correct: 0, lastSeen: 0 };
        entry.seen += 1;
        if (drill.answer === drill.correctAnswer) entry.correct += 1;
        entry.lastSeen = nowMs;
        stats.kana[key] = entry;
      }
      localStorage.setItem("kana-drill-stats", JSON.stringify(stats));
    }

    const introScreen = document.getElementById("intro");
    const gameScreen = document.getElementById("game");
    const resultsScreen = document.getElementById("results");

    gameScreen.classList.add("hide");
    resultsScreen.classList.add("hide");

    function addTransition(elem, className, durationMs = 1000) {
      elem.classList.add(className);
      setTimeout(() => elem.classList.remove(className), durationMs);
    }

    function renderDrill(animate = true) {
      const current = kanaDriller.currentDrill();
      const kanaElem = document.getElementById("kana");
      if (animate) addTransition(kanaElem, "enter-kana");
      kanaElem.innerText = current.kana;

      current.candidates.forEach((c, idx) => {
        const candidateElem = document.getElementById(`candidate-${idx + 1}`);

        if (animate) addTransition(candidateElem, "enter-candidate");

        candidateElem.innerText = c;

        if (current.answer && current.answer === c) {
          candidateElem.classList.add(
            current.answer === current.correctAnswer ? "correct" : "incorrect",
          );
        } else if (current.answer && c === current.correctAnswer) {
          candidateElem.classList.add("correct-answer");
        } else {
          candidateElem.classList.remove("correct");
          candidateElem.classList.remove("incorrect");
          candidateElem.classList.remove("correct-answer");
        }

        candidateElem.disabled = !!current.answer;
      });

      const previousButton = document.getElementById("previous");
      const nextButton = document.getElementById("next");

      if (kanaDriller.isFirst()) {
        previousButton.disabled = true;
        previousButton.innerText = " ";
      } else {
        previousButton.disabled = false;
        previousButton.innerText = "<";
      }

      if (kanaDriller.isLast()) {
        nextButton.disabled = true;
        nextButton.innerText = " ";
      } else {
        nextButton.disabled = false;
        nextButton.innerText = ">";
      }
    }

    function renderResults() {
      const elapsed = Math.round((Date.now() - startTime) / 1000);
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;
      const timeStr =
        minutes > 0
          ? `${minutes}:${String(seconds).padStart(2, "0")}`
          : `${seconds}s`;
      document.getElementById("result-time").textContent = timeStr;

      const result = kanaDriller.result();
      const stats = loadStats();
      saveStats(stats, result, selectedScript);
      document.body.style.setProperty(
        "--resultProgressPercent",
        `${Math.round(100 * (result.points / result.drills.length))}%`,
      );
      gameScreen.classList.add("hide");
      introScreen.classList.add("hide");
      resultsScreen.classList.remove("hide");

      const drills = result.drills
        .map((drill) => {
          const isCorrect = drill.answer === drill.correctAnswer;
          return `
    <li class="${isCorrect ? "correct-drill" : "failed-drill"}">
        <span class="icon"></span>
        <div class="kana">${drill.kana}</div>
        <div class="text answer">${drill.answer || " "}</div>
        <div class="text correct">${isCorrect ? " " : drill.correctAnswer}</div>
    </li>
            `;
        })
        .join("\n")
        .trim();

      const template = document.createElement("template");
      template.innerHTML = drills;

      document.getElementById("drills").append(...template.content.childNodes);
    }

    function selectScript(script) {
      selectedScript = script;
      document
        .querySelectorAll("#opt-katakana, #opt-hiragana")
        .forEach((btn) => btn.classList.remove("selected"));
      document.getElementById(`opt-${script}`).classList.add("selected");
      savePrefs();
    }

    function selectKanaSet(set) {
      selectedKanaSet = set;
      document
        .querySelectorAll("#opt-enkel, #opt-utokad")
        .forEach((btn) => btn.classList.remove("selected"));
      document
        .getElementById(set === "basic" ? "opt-enkel" : "opt-utokad")
        .classList.add("selected");
      savePrefs();
    }

    function selectCount(count) {
      selectedCount = count;
      document
        .querySelectorAll("#opt-20, #opt-30, #opt-50, #opt-all")
        .forEach((btn) => btn.classList.remove("selected"));
      const id = count === "ALL" ? "opt-all" : `opt-${count}`;
      document.getElementById(id).classList.add("selected");
      savePrefs();
    }

    function startGame() {
      startTime = Date.now();
      const stats = loadStats();
      const kanaStats = {};
      for (const [key, val] of Object.entries(stats.kana)) {
        if (key.startsWith(selectedScript + ":")) {
          kanaStats[key.slice(selectedScript.length + 1)] = val;
        }
      }
      kanaDriller = KanaDriller(
        selectedCount,
        selectedScript,
        kanaStats,
        selectedKanaSet,
      );
      document.getElementById("drills").innerHTML = "";
      renderDrill();
      gameScreen.classList.remove("hide");
      introScreen.classList.add("hide");
      resultsScreen.classList.add("hide");
    }

    function previous() {
      kanaDriller.previousDrill();
      renderDrill();
    }

    function next() {
      if (kanaDriller.isLast()) {
        renderResults();
      } else {
        kanaDriller.nextDrill();
        renderDrill();
      }
    }

    function respond(e) {
      const answer = e.target.innerText;
      kanaDriller.respond(answer);

      const current = kanaDriller.currentDrill();
      renderDrill(false);

      if (answer === current.correctAnswer) {
        next();
      } else {
        setTimeout(next, 3000);
      }
    }

    function goToStart() {
      resultsScreen.classList.add("hide");
      gameScreen.classList.add("hide");
      introScreen.classList.remove("hide");
    }
  </script>
</html>
